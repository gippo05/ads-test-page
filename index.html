<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AdVanced DSP — Ad Delivery Test Harness v2</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0f;color:#e0e0e0}
        .header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:1px solid #2a2a4a;padding:20px 40px;display:flex;align-items:center;justify-content:space-between}
        .header h1{font-size:20px;color:#00d4ff}
        .badge{background:#00d4ff22;color:#00d4ff;padding:4px 12px;border-radius:20px;font-size:12px}
        .controls{background:#12121a;border-bottom:1px solid #2a2a4a;padding:16px 40px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
        .controls label{font-size:13px;color:#888}
        .controls input,.controls select{background:#1a1a2e;border:1px solid #2a2a4a;color:#e0e0e0;padding:8px 12px;border-radius:6px;font-size:13px}
        .controls button{background:linear-gradient(135deg,#00d4ff,#0088cc);color:#000;border:none;padding:8px 20px;border-radius:6px;font-weight:600;cursor:pointer;font-size:13px}
        .controls button:hover{opacity:.9}
        .controls button.secondary{background:#2a2a4a;color:#e0e0e0}
        .main{display:flex;height:calc(100vh - 180px)}
        .sidebar{width:320px;min-width:320px;background:#12121a;border-right:1px solid #2a2a4a;overflow-y:auto;padding:16px}
        .sidebar h3{font-size:14px;color:#00d4ff;margin-bottom:12px}
        .log-entry{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:6px;padding:10px;margin-bottom:8px;font-size:12px}
        .log-entry .time{color:#666}
        .log-entry .type{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600}
        .type.bid{background:#00d4ff22;color:#00d4ff}
        .type.win{background:#00ff8822;color:#00ff88}
        .type.imp{background:#ffaa0022;color:#ffaa00}
        .type.error{background:#ff444422;color:#ff4444}
        .type.info{background:#88888822;color:#aaa}
        .log-entry .detail{color:#999;margin-top:4px;word-break:break-all}
        .content{flex:1;overflow-y:auto;padding:24px}
        .test-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:20px}
        .ad-slot{background:#12121a;border:1px solid #2a2a4a;border-radius:8px;overflow:hidden}
        .ad-slot-header{padding:12px 16px;border-bottom:1px solid #2a2a4a;display:flex;justify-content:space-between;align-items:center}
        .ad-slot-header h4{font-size:13px}
        .ad-slot-header .size{color:#666;font-size:12px}
        .ad-slot-body{display:flex;align-items:center;justify-content:center;min-height:200px;padding:16px;position:relative}
        .placeholder{border:2px dashed #2a2a4a;border-radius:4px;display:flex;align-items:center;justify-content:center;color:#444;font-size:12px;text-align:center}
        .ad-rendered{border:1px solid #00d4ff44;box-shadow:0 0 20px #00d4ff11;border-radius:4px;overflow:hidden}
        .ad-slot-footer{padding:8px 16px;border-top:1px solid #2a2a4a;font-size:11px;color:#666;display:flex;justify-content:space-between}
        .status-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
        .status-dot.waiting{background:#666}
        .status-dot.loading{background:#ffaa00;animation:pulse 1s infinite}
        .status-dot.success{background:#00ff88}
        .status-dot.error{background:#ff4444}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
        .stats-bar{background:#12121a;border-top:1px solid #2a2a4a;padding:12px 40px;display:flex;gap:32px;position:fixed;bottom:0;left:0;right:0}
        .stat{font-size:12px}
        .stat span{color:#00d4ff;font-weight:600}
        pre.json-output{background:#0a0a0f;border:1px solid #2a2a4a;border-radius:6px;padding:12px;font-size:11px;color:#00d4ff;overflow-x:auto;max-height:400px;overflow-y:auto;margin-top:12px;white-space:pre-wrap;word-break:break-all}
        .native-ad{background:#1a1a2e;border-radius:8px;padding:16px;max-width:400px}
        .native-ad img{width:100%;border-radius:6px;margin-bottom:10px}
        .native-ad h3{font-size:16px;margin-bottom:6px;color:#fff}
        .native-ad p{font-size:13px;color:#aaa;margin-bottom:10px}
        .native-ad .cta-btn{background:#00d4ff;color:#000;padding:8px 16px;border:none;border-radius:4px;font-weight:600;cursor:pointer;display:inline-block;text-decoration:none}
        .native-ad .sponsored{font-size:10px;color:#666;margin-top:8px}
    </style>
</head>
<body>

<div class="header">
    <h1>🎯 AdVanced DSP — Ad Delivery Test Harness</h1>
    <div class="badge">v2.0 Full Rendering</div>
</div>

<div class="controls">
    <div>
        <label>Bidder Endpoint</label><br>
        <input type="text" id="endpoint" value="https://ljkipupctwrbyaywsxfm.supabase.co/functions/v1/prebid-bidder-adapter" style="width:480px">
    </div>
    <div>
        <label>Test Domain</label><br>
        <input type="text" id="domain" value="test-publisher.example.com">
    </div>
    <div>
        <label>Geo</label><br>
        <input type="text" id="geo" value="USA" style="width:60px">
    </div>
    <div>
        <label>Timeout (ms)</label><br>
        <input type="number" id="tmax" value="5000" style="width:80px">
    </div>
    <div style="display:flex;gap:8px;align-self:flex-end">
        <button onclick="runAllTests()">▶ Run All Tests</button>
        <button class="secondary" onclick="clearAll()">Clear</button>
    </div>
</div>

<div class="main">
    <div class="sidebar">
        <h3>📋 Event Log</h3>
        <div id="log-container"></div>
    </div>

    <div class="content">
        <div class="test-grid" id="test-grid"></div>
        <h3 style="margin-top:24px;color:#00d4ff;font-size:14px">Raw Bid Responses</h3>
        <pre class="json-output" id="json-output">Run tests to see raw OpenRTB responses...</pre>
    </div>
</div>

<div class="stats-bar">
    <div class="stat">Requests: <span id="stat-requests">0</span></div>
    <div class="stat">Bids Won: <span id="stat-bids">0</span></div>
    <div class="stat">No-Bids: <span id="stat-nobids">0</span></div>
    <div class="stat">Errors: <span id="stat-errors">0</span></div>
    <div class="stat">Avg Latency: <span id="stat-latency">—</span></div>
    <div class="stat">Impressions: <span id="stat-impressions">0</span></div>
</div>

<script>
// ─── Test Slot Definitions ────────────────────────────────────────
const TEST_SLOTS = [
    { id: 'banner-300x250', label: 'Banner — Medium Rectangle', size: '300×250', w: 300, h: 250, type: 'banner' },
    { id: 'banner-728x90',  label: 'Banner — Leaderboard',      size: '728×90',  w: 728, h: 90,  type: 'banner' },
    { id: 'banner-160x600', label: 'Banner — Skyscraper',        size: '160×600', w: 160, h: 600, type: 'banner' },
    { id: 'banner-320x50',  label: 'Banner — Mobile',            size: '320×50',  w: 320, h: 50,  type: 'banner' },
    { id: 'video-640x480',  label: 'Video — VAST Pre-roll',      size: '640×480', w: 640, h: 480, type: 'video' },
    { id: 'native-infeed',  label: 'Native — In-Feed',           size: 'Responsive', w: 0, h: 0, type: 'native' },
    { id: 'audio-companion',label: 'Audio — Companion',          size: '300×250 + Audio', w: 300, h: 250, type: 'audio' },
];

// ─── Stats ────────────────────────────────────────────────────────
let stats = { requests: 0, bids: 0, nobids: 0, errors: 0, latencies: [], impressions: 0 };

function updateStats() {
    document.getElementById('stat-requests').textContent = stats.requests;
    document.getElementById('stat-bids').textContent = stats.bids;
    document.getElementById('stat-nobids').textContent = stats.nobids;
    document.getElementById('stat-errors').textContent = stats.errors;
    document.getElementById('stat-impressions').textContent = stats.impressions;
    document.getElementById('stat-latency').textContent = stats.latencies.length
        ? Math.round(stats.latencies.reduce((a,b) => a+b, 0) / stats.latencies.length) + 'ms'
        : '—';
}

// ─── Logging ──────────────────────────────────────────────────────
function addLog(type, message, detail) {
    const container = document.getElementById('log-container');
    const time = new Date().toLocaleTimeString();
    const entry = document.createElement('div');
    entry.className = 'log-entry';
    entry.innerHTML =
        '<span class="time">' + time + '</span> ' +
        '<span class="type ' + type + '">' + type.toUpperCase() + '</span> ' +
        '<span>' + message + '</span>' +
        (detail ? '<div class="detail">' + detail + '</div>' : '');
    container.prepend(entry);
}

// ─── Build Test Grid ──────────────────────────────────────────────
function buildGrid() {
    const grid = document.getElementById('test-grid');
    grid.innerHTML = '';
    TEST_SLOTS.forEach(function(slot) {
        var phW = slot.w || 300;
        var phH = slot.h || 200;
        var div = document.createElement('div');
        div.className = 'ad-slot';
        div.id = 'slot-' + slot.id;
        div.innerHTML =
            '<div class="ad-slot-header">' +
                '<h4>' + slot.label + '</h4>' +
                '<span class="size">' + slot.size + '</span>' +
            '</div>' +
            '<div class="ad-slot-body" id="body-' + slot.id + '">' +
                '<div class="placeholder" style="width:' + Math.min(phW, 340) + 'px;height:' + Math.min(phH, 300) + 'px">' +
                    '<span><span class="status-dot waiting" id="dot-' + slot.id + '"></span>Waiting for bid...</span>' +
                '</div>' +
            '</div>' +
            '<div class="ad-slot-footer">' +
                '<span id="cpm-' + slot.id + '">—</span>' +
                '<span id="latency-' + slot.id + '">—</span>' +
            '</div>';
        grid.appendChild(div);
    });
}

// ─── Build OpenRTB Request ────────────────────────────────────────
function buildRequest(slot) {
    var domain = document.getElementById('domain').value;
    var geo = document.getElementById('geo').value;
    var tmax = parseInt(document.getElementById('tmax').value) || 5000;
    var reqId = 'test-' + slot.id + '-' + Date.now();

    var imp = {
        id: 'imp-' + slot.id,
        bidfloor: 0.01,
        bidfloorcur: 'USD'
    };

    if (slot.type === 'banner') {
        imp.banner = { format: [{ w: slot.w, h: slot.h }], w: slot.w, h: slot.h };
    } else if (slot.type === 'video') {
        imp.video = {
            mimes: ['video/mp4', 'video/webm'],
            protocols: [2, 3, 5, 6],
            w: slot.w, h: slot.h,
            minduration: 5, maxduration: 30,
            linearity: 1, placement: 1
        };
    } else if (slot.type === 'native') {
        imp.native = {
            request: JSON.stringify({
                ver: '1.2',
                assets: [
                    { id: 1, required: 1, title: { len: 90 } },
                    { id: 2, required: 1, img: { type: 3, wmin: 300, hmin: 200 } },
                    { id: 3, required: 0, data: { type: 2, len: 140 } }
                ]
            }),
            ver: '1.2'
        };
    } else if (slot.type === 'audio') {
        imp.audio = {
            mimes: ['audio/mp3', 'audio/mpeg', 'audio/ogg'],
            minduration: 5, maxduration: 30
        };
        imp.banner = { format: [{ w: 300, h: 250 }], w: 300, h: 250 };
    }

    return {
        id: reqId,
        at: 1,
        tmax: tmax,
        cur: ['USD'],
        imp: [imp],
        site: {
            page: 'https://' + domain + '/test-article',
            domain: domain,
            publisher: { id: 'test-pub-001' }
        },
        device: {
            ua: navigator.userAgent,
            geo: { country: geo },
            w: screen.width,
            h: screen.height,
            language: navigator.language
        },
        user: { id: 'test-user-' + Math.random().toString(36).slice(2, 10) }
    };
}

// ─── Send Bid Request ─────────────────────────────────────────────
async function sendBidRequest(slot) {
    var endpoint = document.getElementById('endpoint').value;
    var request = buildRequest(slot);
    var dot = document.getElementById('dot-' + slot.id);
    var body = document.getElementById('body-' + slot.id);

    dot.className = 'status-dot loading';
    addLog('info', 'Sending ' + slot.type + ' bid request', slot.size + ' → ' + slot.id);
    stats.requests++;
    updateStats();

    var startTime = performance.now();

    try {
        var response = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(request)
        });

        var elapsed = Math.round(performance.now() - startTime);
        stats.latencies.push(elapsed);
        document.getElementById('latency-' + slot.id).textContent = elapsed + 'ms';

        if (response.status === 204) {
            dot.className = 'status-dot error';
            stats.nobids++;
            addLog('info', 'No bid for ' + slot.id, 'HTTP 204 — ' + elapsed + 'ms');
            updateStats();
            return { slot: slot, response: null, elapsed: elapsed };
        }

        var data = await response.json();

        if (data.nbr !== undefined) {
            dot.className = 'status-dot error';
            stats.nobids++;
            addLog('info', 'No bid for ' + slot.id, 'NBR ' + data.nbr + ' — ' + elapsed + 'ms');
            body.querySelector('.placeholder').innerHTML = '<span style="color:#ff4444">No Bid (NBR ' + data.nbr + ')</span>';
            updateStats();
            return { slot: slot, response: data, elapsed: elapsed };
        }

        if (!data.seatbid || !data.seatbid.length || !data.seatbid[0].bid || !data.seatbid[0].bid.length) {
            dot.className = 'status-dot error';
            stats.nobids++;
            addLog('info', 'Empty seatbid for ' + slot.id, elapsed + 'ms');
            updateStats();
            return { slot: slot, response: data, elapsed: elapsed };
        }

        // We have a bid!
        var bid = data.seatbid[0].bid[0];
        var cpm = bid.price;
        dot.className = 'status-dot success';
        stats.bids++;
        document.getElementById('cpm-' + slot.id).textContent = '$' + cpm.toFixed(3) + ' CPM';
        addLog('bid', 'Won ' + slot.id, '$' + cpm.toFixed(3) + ' CPM — crid: ' + bid.crid + ' — ' + elapsed + 'ms');

        // Fire win notice (nurl)
        if (bid.nurl) {
            var winUrl = bid.nurl.replace(/\$\{AUCTION_PRICE\}/g, cpm);
            fetch(winUrl, { mode: 'no-cors' }).catch(function() {});
            addLog('win', 'Win notice fired', bid.nurl.substring(0, 80) + '...');
        }

        // Render the ad
        renderAd(slot, bid, body);

        // Fire billing url (burl) after render
        if (bid.burl) {
            var burlUrl = bid.burl.replace(/\$\{AUCTION_PRICE\}/g, cpm);
            setTimeout(function() {
                fetch(burlUrl, { mode: 'no-cors' }).catch(function() {});
                addLog('imp', 'Billing pixel fired', burlUrl.substring(0, 80) + '...');
                stats.impressions++;
                updateStats();
            }, 500);
        }

        updateStats();
        return { slot: slot, response: data, elapsed: elapsed };

    } catch (err) {
        var elapsed2 = Math.round(performance.now() - startTime);
        dot.className = 'status-dot error';
        stats.errors++;
        addLog('error', 'Request failed for ' + slot.id, err.message);
        var placeholder = body.querySelector('.placeholder');
        if (placeholder) {
            placeholder.innerHTML = '<span style="color:#ff4444">Error: ' + escapeHtml(err.message) + '</span>';
        } else {
            body.innerHTML = '<div class="placeholder" style="width:200px;height:100px;color:#ff4444"><span>Error: ' + escapeHtml(err.message) + '</span></div>';
        }
        updateStats();
        return { slot: slot, response: null, elapsed: elapsed2, error: err.message };
    }
}

function createSandboxedAdFrame(content, frameWidth, frameHeight, creativeWidth, creativeHeight, background) {
    var iframe = document.createElement('iframe');
    iframe.width = frameWidth;
    iframe.height = frameHeight;
    iframe.style.border = 'none';
    iframe.style.borderRadius = '4px';
    iframe.setAttribute('sandbox', 'allow-scripts allow-popups allow-popups-to-escape-sandbox');
    iframe.setAttribute('scrolling', 'no');

    var safeCreativeWidth = creativeWidth || frameWidth;
    var safeCreativeHeight = creativeHeight || frameHeight;
    var scale = Math.min(frameWidth / safeCreativeWidth, frameHeight / safeCreativeHeight, 1);

    iframe.srcdoc = '<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">' +
        '<style>' +
        'html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:' + background + ';}' +
        'body{display:flex;align-items:center;justify-content:center;}' +
        '.creative-shell{width:' + safeCreativeWidth + 'px;height:' + safeCreativeHeight + 'px;display:flex;align-items:center;justify-content:center;transform:scale(' + scale + ');transform-origin:center center;}' +
        'img,video{max-width:100%;max-height:100%;display:block;}' +
        '</style></head><body><div class="creative-shell">' + content + '</div></body></html>';

    return iframe;
}

// ─── Render Ad Creative ───────────────────────────────────────────
function renderAd(slot, bid, container) {
    var adm = bid.adm;
    if (!adm) {
        container.innerHTML = '<div class="placeholder" style="width:200px;height:100px;color:#ff4444">No adm in bid</div>';
        return;
    }

    if (slot.type === 'banner' || slot.type === 'audio') {
        var w = bid.w || slot.w || 300;
        var h = bid.h || slot.h || 250;
        var frame = createSandboxedAdFrame(adm, Math.min(w, 340), Math.min(h, 300), w, h, '#f7f7f7');

        container.innerHTML = '';
        var wrapper = document.createElement('div');
        wrapper.className = 'ad-rendered';
        wrapper.appendChild(frame);
        container.appendChild(wrapper);

        addLog('imp', 'Rendered ' + slot.type + ' ad in iframe', w + '×' + h);

    } else if (slot.type === 'video') {
        if (adm.indexOf('<VAST') !== -1 || adm.indexOf('<vast') !== -1) {
            container.innerHTML =
                '<div class="ad-rendered" style="max-width:340px">' +
                    '<div style="background:#000;border-radius:6px;padding:20px;text-align:center;color:#00d4ff">' +
                        '<div style="font-size:14px;margin-bottom:8px">✅ VAST Response Received</div>' +
                        '<div style="font-size:11px;color:#888">VAST XML (' + adm.length + ' bytes)</div>' +
                        '<pre style="text-align:left;font-size:10px;color:#666;max-height:150px;overflow:auto;margin-top:8px;background:#111;padding:8px;border-radius:4px">' +
                            escapeHtml(adm.substring(0, 500)) + '...</pre>' +
                    '</div>' +
                '</div>';
            addLog('imp', 'Rendered VAST response', adm.length + ' bytes');
        } else {
            var frame2 = createSandboxedAdFrame(adm, Math.min(slot.w, 340), Math.min(slot.h, 300), slot.w, slot.h, '#000');
            container.innerHTML = '';
            var wrapper2 = document.createElement('div');
            wrapper2.className = 'ad-rendered';
            wrapper2.appendChild(frame2);
            container.appendChild(wrapper2);
            addLog('imp', 'Rendered video fallback ad', slot.w + '×' + slot.h);
        }

    } else if (slot.type === 'native') {
        var nativeData = null;
        try { nativeData = JSON.parse(adm); } catch(e) {}

        if (nativeData && (nativeData.native || nativeData.assets || nativeData.link)) {
            var native = nativeData.native || nativeData;
            var assets = native.assets || [];
            var link = native.link || {};
            var title = '', img = '', desc = '';
            for (var i = 0; i < assets.length; i++) {
                if (assets[i].title) title = assets[i].title.text || '';
                if (assets[i].img) img = assets[i].img.url || '';
                if (assets[i].data) desc = assets[i].data.value || '';
            }
            title = title || 'Sponsored Content';

            container.innerHTML =
                '<div class="native-ad ad-rendered">' +
                    (img ? '<img src="' + escapeHtml(img) + '" alt="Ad" onerror="this.style.display=\'none\'">' : '') +
                    '<h3>' + escapeHtml(title) + '</h3>' +
                    (desc ? '<p>' + escapeHtml(desc) + '</p>' : '') +
                    '<a class="cta-btn" href="' + escapeHtml(link.url || '#') + '" target="_blank" rel="noopener">Learn More</a>' +
                    '<div class="sponsored">Sponsored · ad-vanced.media</div>' +
                '</div>';
            addLog('imp', 'Rendered native ad', title);
        } else {
            var frame3 = createSandboxedAdFrame(adm, 340, 250, 340, 250, '#f7f7f7');
            container.innerHTML = '';
            var wrapper3 = document.createElement('div');
            wrapper3.className = 'ad-rendered';
            wrapper3.appendChild(frame3);
            container.appendChild(wrapper3);
            addLog('imp', 'Rendered native fallback as banner', adm.length + ' bytes');
        }
    }
}

// ─── Run All Tests ────────────────────────────────────────────────
async function runAllTests() {
    clearAll();
    buildGrid();
    addLog('info', 'Starting all tests...', TEST_SLOTS.length + ' slots');

    var allResponses = [];

    // Run sequentially so cold start warms up for subsequent requests
    for (var i = 0; i < TEST_SLOTS.length; i++) {
        var result = await sendBidRequest(TEST_SLOTS[i]);
        allResponses.push(result);
        // Small delay between requests
        await new Promise(function(r) { setTimeout(r, 300); });
    }

    // Show raw JSON
    var outputData = allResponses.map(function(r) {
        return {
            slot: r.slot.id,
            type: r.slot.type,
            latency_ms: r.elapsed,
            error: r.error || null,
            response: r.response
        };
    });
    document.getElementById('json-output').textContent = JSON.stringify(outputData, null, 2);

    addLog('info', 'All tests complete', stats.bids + ' bids, ' + stats.nobids + ' no-bids, ' + stats.errors + ' errors');
}

// ─── Clear ────────────────────────────────────────────────────────
function clearAll() {
    stats = { requests: 0, bids: 0, nobids: 0, errors: 0, latencies: [], impressions: 0 };
    updateStats();
    document.getElementById('log-container').innerHTML = '';
    document.getElementById('json-output').textContent = 'Run tests to see raw OpenRTB responses...';
    buildGrid();
}

// ─── Helpers ──────────────────────────────────────────────────────
function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

// Init
buildGrid();
</script>
</body>
</html>
